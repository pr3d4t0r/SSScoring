<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1024 1024' width='1024' height='1024'>
  <defs>
    <linearGradient id='bgGrad' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0%' stop-color='#1e3a5f'/>
      <stop offset='100%' stop-color='#0a1628'/>
    </linearGradient>
  </defs>

  <!-- Squircle backplate (macOS Big Sur+ proportions) -->
  <rect x='0' y='0' width='1024' height='1024' rx='200' ry='200' fill='url(#bgGrad)'/>

  <!-- PLACEHOLDER for ISSA skydiver path. Replace this <path> with the
       actual SVG path data from the ISSA branding kit. -->
  <g transform='translate(280, 80)'>
    <path d='M 230 0 Q 215 200 205 420 Q 200 600 195 780 Q 200 830 220 855 Q 245 870 270 855 Q 295 830 300 780 Q 305 600 300 420 Q 295 200 285 30 Q 270 5 230 0 Z'
          fill='white' opacity='0.97'/>
  </g>

  <!-- Speed-curve ideogram bottom-right: rises, peaks, drops sharply.
       Echoes the actual shape of a speed-skydiving velocity profile. -->
  <g transform='translate(620, 680)' stroke='white' fill='none' stroke-linecap='round' stroke-linejoin='round'>
    <line x1='0' y1='240' x2='320' y2='240' stroke-width='6' opacity='0.35'/>
    <line x1='0' y1='0' x2='0' y2='240' stroke-width='6' opacity='0.35'/>
    <path d='M 0 220 Q 80 200 140 130 Q 200 50 240 30 Q 270 50 300 180' stroke-width='18'/>
    <circle cx='240' cy='30' r='14' fill='#ff7847' stroke='none'/>
  </g>
</svg>

